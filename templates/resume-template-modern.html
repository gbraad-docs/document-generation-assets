<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Gerard Braad - Resume</title>
    <meta name="description" content="Gerard Braad - Resume">
    <meta name="HandheldFriendly" content="True">
    <meta http-equiv="cleartype" content="on">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
/* Modern Resume Theme - Matching website/blog style */

:root {
    /* Colors matching website theme */
    --bg-primary: #f5f5f5;
    --bg-secondary: #ffffff;
    --text-primary: #333333;
    --text-secondary: #666666;
    --accent-orange: #ff8c00;
    --accent-blue: #0f93f9;
    --border-color: #e0e0e0;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html {
    background: var(--bg-primary);
}

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica', 'Arial', sans-serif;
    font-size: 14px;
    line-height: 1.6;
    color: var(--text-primary);
    background: var(--bg-primary);
    padding: 20px 0;
}

@media print {
    body {
        background: white;
        padding: 0;
    }
}

#main-wrapper {
    max-width: 900px;
    margin: 0 auto;
    background: var(--bg-secondary);
    padding: 40px;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
}

@media print {
    #main-wrapper {
        box-shadow: none;
        padding: 20px;
        max-width: 100%;
    }
}

/* Header / Name */
#gerard-braad h1 {
    font-size: 42px;
    font-weight: 700;
    text-align: center;
    color: var(--accent-orange);
    margin: 0 0 20px 0;
    text-transform: none;
    letter-spacing: -0.5px;
}

section#gerard-braad {
    page-break-before: avoid;
    margin-bottom: 30px;
    border-bottom: 3px solid var(--accent-orange);
    padding-bottom: 20px;
}

/* Contact info (paragraph after name) */
section#gerard-braad p {
    text-align: center;
    font-size: 15px;
    color: var(--text-secondary);
    margin: 10px 0;
}

section#gerard-braad a {
    color: var(--accent-blue);
    text-decoration: none;
}

section#gerard-braad a:hover {
    color: var(--accent-orange);
    text-decoration: underline;
}

/* Photo */
figure {
    width: 160px;
    float: right;
    margin: 0 0 20px 20px;
    border: 3px solid var(--accent-orange);
    border-radius: 8px;
    overflow: hidden;
}

figure img {
    display: block;
    width: 100%;
    height: auto;
}

figcaption {
    display: none;
}

/* Headings */
h2 {
    font-size: 24px;
    font-weight: 700;
    color: var(--accent-blue);
    margin: 30px 0 15px 0;
    padding-bottom: 8px;
    border-bottom: 2px solid var(--accent-blue);
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

h3 {
    font-size: 18px;
    font-weight: 600;
    color: var(--accent-orange);
    margin: 20px 0 10px 0;
}

h4 {
    font-size: 16px;
    font-weight: 600;
    color: var(--text-primary);
    margin: 15px 0 8px 0;
}

h5 {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-secondary);
    margin: 12px 0 6px 0;
}

h6 {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-secondary);
    margin: 10px 0 5px 0;
}

/* Links */
a {
    color: var(--accent-orange);
    text-decoration: none;
}

a:hover {
    color: var(--accent-blue);
    text-decoration: underline;
}

/* Paragraphs and text */
p {
    margin: 10px 0;
    line-height: 1.6;
}

/* Lists */
ul, ol {
    margin: 10px 0;
    padding-left: 0;
}

ul {
    list-style: none;
}

ul li {
    position: relative;
    padding-left: 20px;
    margin: 6px 0;
}

ul li:before {
    content: "▸";
    position: absolute;
    left: 0;
    color: var(--accent-blue);
    font-weight: bold;
}

ol {
    padding-left: 25px;
}

ol li {
    margin: 6px 0;
}

/* Strong/Bold text */
strong, b {
    font-weight: 600;
    color: var(--text-primary);
}

/* Emphasis/Italic */
em, i {
    font-style: italic;
    color: var(--text-secondary);
}

/* Code */
code, tt {
    font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
    font-size: 0.9em;
    background: var(--bg-primary);
    padding: 2px 6px;
    border-radius: 3px;
    border: 1px solid var(--border-color);
}

pre {
    background: var(--bg-primary);
    border: 1px solid var(--border-color);
    border-radius: 4px;
    padding: 12px;
    overflow-x: auto;
    margin: 15px 0;
    font-size: 13px;
    line-height: 1.5;
}

pre code {
    background: transparent;
    border: none;
    padding: 0;
}

/* Blockquotes */
blockquote {
    border-left: 4px solid var(--accent-orange);
    padding: 10px 20px;
    margin: 15px 0;
    background: var(--bg-primary);
    color: var(--text-secondary);
    font-style: italic;
}

/* Tables */
table {
    width: 100%;
    border-collapse: collapse;
    margin: 15px 0;
}

table th {
    background: var(--accent-orange);
    color: white;
    font-weight: 600;
    padding: 10px;
    text-align: left;
    border: 1px solid var(--border-color);
}

table td {
    padding: 10px;
    border: 1px solid var(--border-color);
}

table tr:nth-child(even) {
    background: var(--bg-primary);
}

/* Horizontal rules */
hr {
    border: none;
    border-top: 2px solid var(--border-color);
    margin: 25px 0;
}

/* Page breaks for print */
section#employment-history {
    page-break-before: auto;
}

section#education {
    page-break-before: auto;
}

section#honors-and-recognition {
    page-break-before: avoid;
}

h2 {
    page-break-after: avoid;
}

h3 {
    page-break-after: avoid;
}

/* Employment entries */
section#employment-history h3 {
    margin-top: 25px;
}

section#employment-history h3:first-of-type {
    margin-top: 15px;
}

/* Date ranges in italics */
section#employment-history em,
section#education em {
    color: var(--text-secondary);
    font-size: 14px;
}

/* Skills section enhancement */
section#skills ul,
section#technical-skills ul,
section#core-competencies ul {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 8px;
    margin: 15px 0;
}

section#skills ul li,
section#technical-skills ul li,
section#core-competencies ul li {
    background: var(--bg-primary);
    padding: 8px 12px;
    border-radius: 4px;
    border-left: 3px solid var(--accent-blue);
}

/* Highlights/achievements */
section#key-achievements ul li,
section#achievements ul li {
    background: var(--bg-primary);
    padding: 10px 15px;
    margin: 10px 0;
    border-radius: 4px;
    border-left: 4px solid var(--accent-orange);
}

/* Print optimizations */
@media print {
    body {
        font-size: 11pt;
    }

    #main-wrapper {
        padding: 0;
        box-shadow: none;
    }

    h2 {
        font-size: 18pt;
        margin-top: 20pt;
    }

    h3 {
        font-size: 14pt;
    }

    a {
        color: inherit;
        text-decoration: none;
    }

    a[href]:after {
        content: none;
    }

    section#skills ul,
    section#technical-skills ul,
    section#core-competencies ul {
        display: block;
    }

    section#skills ul li,
    section#technical-skills ul li,
    section#core-competencies ul li {
        display: inline-block;
        margin-right: 10px;
        margin-bottom: 5px;
    }
}

/* Responsive adjustments */
@media (max-width: 768px) {
    body {
        padding: 10px;
    }

    #main-wrapper {
        padding: 20px;
    }

    #gerard-braad h1 {
        font-size: 32px;
    }

    h2 {
        font-size: 20px;
    }

    figure {
        float: none;
        margin: 0 auto 20px auto;
        display: block;
    }

    section#skills ul,
    section#technical-skills ul,
    section#core-competencies ul {
        grid-template-columns: 1fr;
    }
}

/* Optional: Add subtle animation on hover for links */
@media (hover: hover) {
    a {
        transition: color 0.2s ease;
    }
}
    </style>
</head>
<body>
    <div id="main-wrapper" class="page">
$body$
    </div>
</body>
</html>
