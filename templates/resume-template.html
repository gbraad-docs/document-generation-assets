<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Gerard Braad</title>
        <meta name="description" content="Gerard Braad - Resume">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css?family=Open+Sans:400,700&display=optional" rel="stylesheet">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
        <link href="//cdn.gbraad.nl/css/shared-theme.css" rel="stylesheet">

        <style>
            body {
                display: flex;
                flex-direction: column;
                min-height: 100vh;
            }

            .content-wrapper {
                flex: 1;
            }

            /* Resume content styling */
            .resume-content {
                max-width: 900px;
                margin: 0 auto;
                padding: 40px 20px;
                background: var(--bg-secondary);
                border: 1px solid var(--border);
            }

            .resume-content h1 {
                font-size: 2em;
                color: var(--accent-orange);
                text-align: center;
                margin-bottom: 5px;
                letter-spacing: 3px;
            }

            .resume-content h2 {
                font-size: 1.1em;
                color: var(--accent-blue);
                border-bottom: 1px solid var(--border);
                padding-bottom: 5px;
                margin-top: 30px;
                letter-spacing: 2px;
            }

            .resume-content h3 {
                font-size: 1em;
                color: var(--text-primary);
                margin-top: 15px;
            }

            .resume-content p {
                color: var(--text-secondary);
                line-height: 1.7;
            }

            .resume-content ul {
                padding-left: 20px;
                margin-bottom: 15px;
            }

            .resume-content ul li {
                list-style: disc;
                color: var(--text-secondary);
                margin-bottom: 5px;
                line-height: 1.6;
            }

            .resume-content a {
                color: var(--accent-blue);
            }

            .resume-content a:hover {
                color: var(--accent-orange);
            }

            .resume-content table {
                width: 100%;
                border-collapse: collapse;
                margin: 15px 0;
            }

            .resume-content table td,
            .resume-content table th {
                padding: 8px 12px;
                border: 1px solid var(--border);
                color: var(--text-secondary);
            }

            .resume-content img {
                max-width: 100%;
                height: auto;
                display: block;
            }

            .resume-content figure {
                width: 140px;
                float: right;
                margin: 5px 0 10px 20px;
                padding: 6px;
                border: 1px solid var(--border);
                background: var(--bg-tertiary);
                overflow: hidden;
            }

            .resume-content figcaption {
                display: none;
            }

            .resume-content::after {
                content: '';
                display: table;
                clear: both;
            }

            @media print {
                .top-banner,
                footer {
                    display: none !important;
                }

                .resume-content {
                    border: none;
                    padding: 0;
                    max-width: 100%;
                }

                body {
                    background: white;
                    color: black;
                }
            }
        </style>
    </head>
    <body>

        <div class="top-banner">
            <div class="banner-left">
                <a href="https://gbraad.nl" class="back-button" title="gbraad.nl">&#8592;</a>
                <div class="banner-title">
                    <img src="//cdn.gbraad.nl/images/logo.svg" alt="Gerard Braad" class="banner-logo">
                    Gerard Braad
                </div>
            </div>
            <nav class="banner-nav">
                <a href="https://gbraad.nl">Home</a>
                <a href="https://blog.gbraad.nl">Blog</a>
                <a href="index.html">Résumé</a>
            </nav>
        </div>

        <div class="content-wrapper">
            <div class="container">
                <div class="resume-content">
$body$
                </div>
            </div>
        </div>

        <footer>
            <div class="footer-content">
                <ul class="social-links">
                    <li><a href="https://github.com/gbraad/" title="GitHub"><i class="fab fa-github"></i></a></li>
                    <li><a href="https://gitlab.com/gbraad" title="GitLab"><i class="fab fa-gitlab"></i></a></li>
                    <li><a href="https://mastodon.social/@gbraad" title="Mastodon"><i class="fab fa-mastodon"></i></a></li>
                    <li><a href="https://linkedin.com/in/gbraad" title="LinkedIn"><i class="fab fa-linkedin"></i></a></li>
                </ul>
                <p class="copyright">&copy; Gerard Braad</p>
            </div>
        </footer>

        <script>
            (function(i,s,o,g,r,a,m){i['GoogleAnalyticsObject']=r;i[r]=i[r]||function(){
            (i[r].q=i[r].q||[]).push(arguments)},i[r].l=1*new Date();a=s.createElement(o),
            m=s.getElementsByTagName(o)[0];a.async=1;a.src=g;m.parentNode.insertBefore(a,m)
            })(window,document,'script','https://www.google-analytics.com/analytics.js','ga');
            ga('create', 'UA-34531495-4', 'auto');
            ga('send', 'pageview');
        </script>
    </body>
</html>
